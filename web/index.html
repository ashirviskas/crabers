<!DOCTYPE html>
<html>
<head>
    <title>Crabers Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <script type="module">
        import init from './crabers.js';

        async function loadWasm() {
            try {
                await init('./crabers_bg.wasm');
            } catch (err) {
                console.error('Loading Wasm failed:', err);
            }
        }

        loadWasm();
    </script>
</body>
</html>
